description = "Cache freshness age + cache token usage"
components = ["time", "cache"]
has_compact = true

[theme.time]
label = "Cache age (warm)"
palette_role = "success"

[theme.time_caution]
label = "Cache age (caution)"
palette_role = "warning"

[theme.time_expired]
label = "Cache age (expired)"
palette_role = "danger"

[theme.label]
label = "Icon / empty"
palette_role = "muted"

[theme.cache_read]
label = "Cache Read"
palette_role = "success"

[theme.cache_write]
label = "Cache Write"
palette_role = "warning"

[icons.icon]
label = "Icon"
icons_field = "icon"
default_value = "\U0001F5C4 "
is_char = false

[icons.cache_read]
label = "Cache read prefix"
icons_field = "cache_read"
default_value = "read:"
is_char = false

[icons.cache_write]
label = "Cache write prefix"
icons_field = "cache_write"
default_value = "write:"
is_char = false

[icons.cache_read_compact]
label = "Cache read prefix (compact)"
icons_field = "cache_read_compact"
default_value = "R:"
is_char = false

[icons.cache_write_compact]
label = "Cache write prefix (compact)"
icons_field = "cache_write_compact"
default_value = "W:"
is_char = false

[settings.cache_ttl]
label = "Cache TTL (seconds)"
type = "int"
default = 300
min = 60
max = 600
